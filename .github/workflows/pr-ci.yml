name: PR CI

on:
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          XCODE=$(ls /Applications | grep -E "^Xcode" | sort -V | tail -1)
          sudo xcode-select -s /Applications/$XCODE/Contents/Developer
          xcodebuild -version

      - name: Run unit tests
        run: |
          xcodebuild test \
            -project Sanguine.xcodeproj \
            -scheme Sanguine \
            -destination "platform=iOS Simulator,OS=latest,name=iPhone 16" \
            -only-testing SanguineTests/ReadingStatsTests \
            -only-testing SanguineTests/DoseStatsTests \
            -only-testing SanguineTests/DosePlanningTests \
            -only-testing SanguineTests/DoseTimeLabelTests \
            -only-testing SanguineTests/CSVExportTests \
            CODE_SIGNING_ALLOWED=NO
